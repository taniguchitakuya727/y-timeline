<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイムラインビューワー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f7f7f7; height: 100vh; display: flex; flex-direction: column; }
    header {
      background: #000;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header h1 { color: #fff; font-size: 16px; font-weight: 500; }
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      flex-shrink: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 12px 24px;
      font-size: 14px;
      cursor: pointer;
      color: #666;
      font-family: -apple-system, sans-serif;
    }
    .tab-btn.active {
      color: #000;
      border-bottom: 2px solid #000;
      font-weight: 500;
    }
    .frame-wrap {
      flex: 1;
      position: relative;
    }
    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      display: none;
    }
    iframe.active { display: block; }
    .loading-msg {
      position: absolute;
      top: 40px; left: 0; right: 0;
      text-align: center;
      color: #999;
      font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </svg>
    <h1>タイムラインビューワー</h1>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab(0)">@shine_uk</button>
    <button class="tab-btn"        onclick="showTab(1)">@openai</button>
  </div>

  <div class="frame-wrap">
    <div class="loading-msg">読み込み中...</div>
    <iframe id="frame-0" class="active" src="https://nitter.net/shine_uk"></iframe>
    <iframe id="frame-1"               src="https://nitter.net/openai"></iframe>
  </div>

  <script>
    function showTab(n) {
      document.querySelectorAll('.tab-btn').forEach(function(b, i) {
        b.classList.toggle('active', i === n);
      });
      document.querySelectorAll('iframe').forEach(function(f, i) {
        f.classList.toggle('active', i === n);
      });
    }
  </script>
</body>
</html>
